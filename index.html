<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dabur - Product Input</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Beautiful Dabur-inspired gradient background */
            background: linear-gradient(135deg, #E8F5E9 0%, #FFFFFF 50%, #FFF3E0 100%);
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Subtle background pattern/elements for depth */
        body::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(82, 177, 47, 0.18) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            animation: float 6s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -80px;
            right: -80px;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(244, 113, 31, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* Container */
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 45px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(27, 92, 41, 0.15),
                        0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            width: 100%;
            max-width: 460px;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease-out;
            border-top: 4px solid #52B12F;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo Section */
        .logo-section {
            margin-bottom: 30px;
        }

        .dabur-logo {
            width: 140px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(27, 92, 41, 0.2));
            transition: transform 0.3s ease;
        }

        .dabur-logo:hover {
            transform: scale(1.05);
        }

        .portal-title {
            font-size: 22px;
            font-weight: 700;
            color: #1B5C29;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .welcome-text {
            font-size: 13px;
            color: #6c757d;
            font-weight: 400;
        }

        /* Form Heading */
        h2 {
            font-size: 18px;
            font-weight: 600;
            color: #1B5C29;
            margin-bottom: 1.5rem;
            text-align: left;
            position: relative;
            padding-bottom: 10px;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, #52B12F, #F4711F);
            border-radius: 2px;
        }

        /* Input Group */
        .input-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #1B5C29;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #E0E0E0;
            border-radius: 12px;
            font-size: 15px;
            color: #333;
            background-color: #F9F9F9;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]::placeholder {
            color: #AAB0B7;
        }

        input[type="text"]:focus {
            border-color: #52B12F;
            background-color: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(82, 177, 47, 0.15);
        }

        /* Submit Button */
        button {
            width: 100%;
            background: linear-gradient(135deg, #52B12F 0%, #1B5C29 100%);
            color: #FFFFFF;
            padding: 14px 25px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            box-shadow: 0 6px 15px rgba(82, 177, 47, 0.3);
            margin-top: 8px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #F4711F 0%, #D85F0F 100%);
            transition: left 0.4s ease;
            z-index: -1;
        }

        button:hover::before {
            left: 0;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(244, 113, 31, 0.4);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 4px 10px rgba(82, 177, 47, 0.3);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Status Message */
        #statusMsg {
            margin-top: 1.2rem;
            font-size: 13px;
            text-align: center;
            min-height: 22px;
            font-weight: 500;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .success {
            color: #16a34a;
            background-color: rgba(22, 163, 74, 0.1);
        }

        .error {
            color: #dc2626;
            background-color: rgba(220, 38, 38, 0.1);
        }

        .loading {
            color: #F4711F;
            background-color: rgba(244, 113, 31, 0.1);
        }

        /* Footer */
        .footer-text {
            margin-top: 25px;
            font-size: 12px;
            color: #888;
        }

        .footer-text span {
            color: #52B12F;
            font-weight: 600;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .container {
                padding: 35px 25px;
                border-radius: 16px;
            }

            .portal-title {
                font-size: 18px;
            }

            .dabur-logo {
                width: 110px;
            }

            input[type="text"] {
                padding: 12px 15px;
                font-size: 14px;
            }

            button {
                padding: 13px 20px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-section">
            <!-- Dabur Logo (using a placeholder URL - replace with your actual logo path) -->
            <img src="/logo.png" alt="Dabur Logo" class="dabur-logo">
            <h1 class="portal-title">My Dabur Portal</h1>
            <p class="welcome-text">Empowering Naturally, Innovating Digitally</p>
        </div>

        <h2>Enter Product Name</h2>
        <div class="input-group">
            <label for="productName">Product Name</label>
            <input type="text" id="productName" placeholder="e.g. Dabur Honey, Dabur Chyawanprash" />
        </div>
        <button id="submitBtn" onclick="submitForm()">Submit Product</button>
        <div id="statusMsg"></div>

        <p class="footer-text">Powered by <span>Dabur India Ltd.</span></p>
    </div>

    <script>
        // Trigger submit on Enter key
        document.getElementById('productName').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') submitForm();
        });

        async function submitForm() {
            const productName = document.getElementById('productName').value.trim();
            const statusMsg = document.getElementById('statusMsg');
            const submitBtn = document.getElementById('submitBtn');

            // Validate input
            if (!productName) {
                statusMsg.textContent = '⚠ Please enter a product name.';
                statusMsg.className = 'error';
                return;
            }

            // Show loading state
            statusMsg.textContent = '⏳ Submitting your request...';
            statusMsg.className = 'loading';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            try {
                const response = await fetch('https://vansh2090.app.n8n.cloud/webhook/product-input
                                             ', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ productName: productName })
                });

                const text = await response.text();
                console.log('Response:', text);

                if (!response.ok) {
                    throw new Error('HTTP ' + response.status + ' ' + text);
                }

                statusMsg.textContent = '✓ Submitted successfully!';
                statusMsg.className = 'success';
                document.getElementById('productName').value = '';

            } catch (error) {
                console.error(error);
                statusMsg.textContent = '✗ Submission failed: ' + error.message;
                statusMsg.className = 'error';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Product';
            }
        }
    </script>

</body>
</html>
